apiVersion: apps/v1
kind: Deployment
metadata:  
  name: gateway
  namespace: shop
spec:
  replicas: 1
  selector: 
    matchLabels: 
      app: gateway
  template:
    metadata: 
      labels:
        app: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html/index.html, subPath: index.html } # This mounts the index.html file from the ca1-ui ConfigMap to the default location where Nginx serves static files, allowing us to serve our custom UI when requests are made to the gateway.
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf } # This mounts the default.conf file from the ca1-nginx-conf ConfigMap to the Nginx configuration directory, allowing us to customize the Nginx configuration for routing and other settings as needed for our gateway service.
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - { name: html, configMap: { name: ca1-ui } } # This volume definition creates a volume named "html" that sources its data from the "ca1-ui" ConfigMap, which contains the index.html file to be served by Nginx. By using a ConfigMap, we can easily manage and update the static content for our gateway without needing to rebuild the container image.
        - { name: conf, configMap: { name: ca1-nginx-conf } } # This volume definition creates a volume named "conf" that sources its data from the "ca1-nginx-conf" ConfigMap, which contains the default.conf file for Nginx configuration. This allows us to manage our Nginx configuration separately from our application code and update it as needed without rebuilding the container image.